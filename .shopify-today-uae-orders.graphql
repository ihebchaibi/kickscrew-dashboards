query TodayUaeOrders($query: String!) {
  orders(first: 250, query: $query) {
    nodes {
      id
      name
      createdAt
      cancelledAt
      shippingAddress {
        country
        countryCodeV2
      }
      currentTotalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      lineItems(first: 50) {
        nodes {
          title
          quantity
          sku
          variantTitle
          discountedTotalSet {
            shopMoney {
              amount
              currencyCode
            }
          }
          product {
            title
            vendor
          }
          variant {
            title
            sku
          }
        }
      }
    }
  }
}
